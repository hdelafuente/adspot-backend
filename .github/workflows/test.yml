name: Test

on:
  push:
    branches:
      - main

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install GCC (required for go-sqlite3 CGO)
        run: sudo apt-get install -y gcc

      - name: Run tests
        run: CGO_ENABLED=1 go test -v -race ./...
